<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Clearance System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{background-image: url("{{ url_for('static', filename='images/background.svg') }}");background-size:cover;background-position:center}
        .auth-card{max-width:420px;margin:6rem auto;padding:2rem;background:rgba(255,255,255,0.92);border-radius:12px}
        .brand-logo{display:block;margin:0 auto 1rem auto;width:100px;height:100px;object-fit:contain}
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 auth-card shadow">
            <img src="{{ url_for('static', filename='images/sch.jpg') }}" alt="Logo" class="brand-logo">
            <h3 class="text-center mb-3">Login</h3>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Matric No or Username</label>
                    <input name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input name="password" type="password" class="form-control" required>
                </div>
                <button class="btn btn-primary w-100">Login</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
