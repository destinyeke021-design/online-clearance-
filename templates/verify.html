<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clearance Verification</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4 text-center">
<h3>Clearance Verification</h3>
<p><strong>{{ student['full_name'] }}</strong> ({{ student['matric_no'] }})</p>

{% if cleared %}
<div class="alert alert-success">Status: CLEARED ✅</div>
{% else %}
<div class="alert alert-danger">Status: NOT CLEARED ❌</div>
{% endif %}

<a href="{{ url_for('login') }}" class="btn btn-primary mt-3">Home</a>
</div>
</body>
</html>
