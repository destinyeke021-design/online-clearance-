<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Uploads</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
<h3>Uploaded Documents</h3>
<a href="{{ url_for('officer_dashboard') }}" class="btn btn-secondary mb-3">Back</a>
<table class="table table-striped">
<thead><tr><th>File Path</th><th>Uploaded At</th><th>Download</th></tr></thead>
<tbody>
{% for u in uploads %}
<tr>
    <td>{{ u['file_path'] }}</td>
    <td>{{ u['uploaded_at'] }}</td>
    <td><a href="{{ url_for('static', filename=u['file_path'].split('static/')[1]) }}" class="btn btn-sm btn-success" target="_blank">Download</a></td>
</tr>
{% endfor %}
</tbody>
</table>
</div>
</body>
</html>
