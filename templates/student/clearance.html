<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clearance Status</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
<h3>Clearance Status for {{ student.full_name }}</h3>
<table class="table table-striped">
<thead><tr><th>Unit</th><th>Status</th><th>Remark</th></tr></thead>
<tbody>
{% for s in statuses %}
<tr>
<td>{{ s.name }}</td>
<td>{{ s.status }}</td>
<td>{{ s.remark }}</td>
</tr>
{% endfor %}
</tbody>
</table>
{% if cleared %}
<a href="/student/download" class="btn btn-success">Download Clearance PDF</a>
{% endif %}
<a href="/logout" class="btn btn-danger">Logout</a>
</div>
</body>
</html>
