<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Add Students (Form)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-4">
        <h3>Bulk Add Students (Form)</h3>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="alert alert-{{ category }}">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" id="bulkForm">
            <div class="table-responsive">
                <table class="table table-bordered" id="studentsTable">
                    <thead class="table-light">
                        <tr>
                            <th style="width: 35%">Full Name</th>
                            <th style="width: 35%">Matric No</th>
                            <th style="width: 20%">Password</th>
                            <th style="width: 10%">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr class="student-row">
                            <td><input type="text" name="full_name_0" class="form-control" placeholder="e.g., John Doe"></td>
                            <td><input type="text" name="matric_no_0" class="form-control" placeholder="e.g., fuku/sci/21/com/001"></td>
                            <td><input type="password" name="password_0" class="form-control" placeholder="Leave blank for 12345678"></td>
                            <td><button type="button" class="btn btn-sm btn-danger remove-row" style="display:none;">Remove</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <input type="hidden" name="num_rows" id="numRows" value="1">

            <div class="mb-3">
                <button type="button" class="btn btn-info" id="addRowBtn">+ Add Another Row</button>
            </div>

            <div class="mb-3">
                <button type="submit" class="btn btn-success">Add Students</button>
                <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>

    <script>
        let rowCount = 1;

        document.getElementById('addRowBtn').addEventListener('click', function() {
            const tableBody = document.getElementById('tableBody');
            const newRow = document.createElement('tr');
            newRow.className = 'student-row';
            newRow.innerHTML = `
                <td><input type="text" name="full_name_${rowCount}" class="form-control" placeholder="e.g., John Doe"></td>
                <td><input type="text" name="matric_no_${rowCount}" class="form-control" placeholder="e.g., fuku/sci/21/com/001"></td>
                <td><input type="password" name="password_${rowCount}" class="form-control" placeholder="Leave blank for 12345678"></td>
                <td><button type="button" class="btn btn-sm btn-danger remove-row">Remove</button></td>
            `;
            tableBody.appendChild(newRow);
            rowCount++;
            updateRemoveButtons();
            updateNumRows();
        });

        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('remove-row')) {
                e.preventDefault();
                e.target.closest('tr').remove();
                updateRemoveButtons();
                updateNumRows();
            }
        });

        function updateRemoveButtons() {
            const rows = document.querySelectorAll('.student-row');
            rows.forEach((row, index) => {
                const removeBtn = row.querySelector('.remove-row');
                removeBtn.style.display = rows.length > 1 ? 'block' : 'none';
            });
        }

        function updateNumRows() {
            const rows = document.querySelectorAll('.student-row');
            document.getElementById('numRows').value = rows.length;
        }

        // Initialize
        updateRemoveButtons();
    </script>
</body>
</html>
