<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Student</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-4">
        <h3>Add Student</h3>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="alert alert-{{ category }}">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

    <form method="POST">

        <div class="mb-2">
            <label>Full Name</label>
            <input name="full_name" class="form-control" required>
        </div>

        <div class="mb-2">
            <label>Matric No</label>
            <input name="matric" class="form-control" required>
        </div>

        <!-- FACULTY (DEFAULT) -->
        <div class="mb-2">
            <label>Faculty</label>
            <input name="faculty" class="form-control" value="Science" readonly>
        </div>

        <!-- DEPARTMENT (DEFAULT) -->
        <div class="mb-2">
            <label>Department</label>
            <input name="department" class="form-control" value="Computer Science" readonly>
        </div>

        <!-- LEVEL (DEFAULT) -->
        <div class="mb-2">
            <label>Level</label>
            <input name="level" class="form-control" value="400" readonly>
        </div>



        <div class="mb-2">
            <label>Password</label>
            <input name="password" type="password" class="form-control" placeholder="Leave blank for default: 12345678">
        </div>

        <button class="btn btn-success">Add Student</button>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Back</a>

    </form>
</div>
</body>
</html>
