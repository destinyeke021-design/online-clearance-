<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login</title>
  <link rel="stylesheet" href="static/css/login.css">
</head>
<body>
  <main class="login-page">
    <img src="https://via.placeholder.com/100?text=Logo" alt="School Logo" class="logo">
    <section class="card">
      <h1 class="brand">Welcome Back</h1>
      <p class="lead">Sign in to continue to your account</p>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="identifier">Email or Username</label>
          <input id="identifier" name="identifier" type="text" inputmode="email" autocomplete="username" required />
          <small class="error" aria-live="polite"></small>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="pw-wrap">
            <input id="password" name="password" type="password" autocomplete="current-password" required />
            <button type="button" id="togglePw" aria-label="Show password">Show</button>
          </div>
          <small class="error" aria-live="polite"></small>
        </div>

        <div class="controls">
          <label class="checkbox"><input type="checkbox" id="remember"> Remember me</label>
          <a class="forgot" href="#">Forgot?</a>
        </div>

        <button class="btn primary" type="submit">Sign In</button>

        <div id="status" class="status" aria-live="polite"></div>
      </form>

      <p class="signup">Don't have an account? <a href="#">Sign up</a></p>
    </section>
  </main>

  <script src="static/js/login.js"></script>
</body>
</html>
